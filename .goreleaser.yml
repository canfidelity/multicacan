version: 2

project_name: multicacan

builds:
  - id: multicacan
    main: ./cmd/multicacan
    dir: server
    binary: multicacan
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  # Legacy archive name kept so already-released CLIs can keep self-updating.
  # Remove once those versions are no longer in use.
  - id: legacy
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
  # Versioned archive name used by current CLI / install scripts /
  # desktop bootstrap going forward.
  - id: versioned
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: multicacan
    ids:
      - versioned
    skip_upload: true
    repository:
      owner: canfidelity
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/canfidelity/multicacan"
    description: "Multicacan CLI — local agent runtime and management tool for the Multicacan platform"
    license: "Apache-2.0"
    install: |
      bin.install "multicacan"
    test: |
      system "#{bin}/multicacan", "version"
